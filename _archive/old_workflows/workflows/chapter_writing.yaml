# 章节写作工作流
# 使用 Pipeline V2 生成章节

workflows:
  chapter_writing:
    name: 章节写作
    description: 使用多 Agent 协作流程生成章节草稿
    category: writing
    priority: 10
    version: "1.0"
    author: system
    
    # 触发配置
    trigger_intents:
      - write_chapter
    trigger_keywords:
      - 写章节
      - 生成章节
      - 续写
      - 草稿
      - 写第
      - 生成第
    
    # 前置条件
    requires_novel_id: true
    requires_outline: true
    
    # 入口阶段
    entry_phase: prepare
    
    # 阶段定义
    phases:
      - phase_id: prepare
        name: 准备上下文
        description: 组装生成所需的上下文
        available_tools:
          - start_chapter_pipeline
        required_tools: []
        context_keys:
          - novel_id
          - chapter_outline
          - characters
          - foreshadowing
          - world
          - manuscript
        user_prompt: |
          正在准备章节生成上下文...
          
          将加载以下内容：
          - 章节大纲目标
          - 涉及人物档案
          - 待回收伏笔
          - 世界观设定
          - 前文摘要
        questions:
          - "要生成哪个章节？（如 ch_001 或 第一章）"
          - "有什么特殊的写作目标或要求吗？"
        auto_advance: false
        next_phase: generate
        options:
          - id: select_chapter
            label: 选择章节
            description: 从大纲中选择要写的章节
          - id: specify_id
            label: 输入章节ID
            description: 直接输入章节ID
      
      - phase_id: generate
        name: 生成草稿
        description: Librarian Agent 生成章节草稿
        available_tools:
          - librarian
        required_tools:
          - librarian
        context_keys:
          - generation_context
        user_prompt: |
          正在生成章节草稿...
          
          生成过程中会：
          - 根据节拍生成内容
          - 自然融入待回收伏笔
          - 保持人物一致性
        auto_advance: true
        next_phase: review
        
      - phase_id: review
        name: 逻辑审查
        description: LoreChecker Agent 检查一致性
        available_tools:
          - lore_checker
        required_tools:
          - lore_checker
        context_keys:
          - draft
          - generation_context
        user_prompt: |
          正在进行逻辑审查...
          
          检查项目：
          - 人物状态一致性
          - 世界观规则遵守
          - 伏笔正确性
          - 跨章节连续性
        auto_advance: true
        next_phase: user_confirm
        
      - phase_id: user_confirm
        name: 用户审核
        description: 等待用户审核和修改
        available_tools: []
        required_tools: []
        context_keys:
          - draft
          - review_result
        user_prompt: |
          草稿已生成，请审核：
          
          **审查结果**: {review_summary}
          
          请查看草稿内容，确认是否符合预期。
        questions:
          - "草稿是否符合预期？"
          - "是否需要进行修改？"
        auto_advance: false
        next_phase: polish
        options:
          - id: approve
            label: 审核通过
            description: 草稿符合预期，继续下一步
          - id: edit
            label: 手动编辑
            description: 我要手动修改草稿
          - id: rewrite
            label: 重新生成
            description: 不满意，重新生成
          - id: adjust_goals
            label: 调整目标
            description: 修改写作目标后重试
        
      - phase_id: polish
        name: 风格润色
        description: Stylist Agent 润色草稿（可选）
        available_tools:
          - stylist
        required_tools: []
        context_keys:
          - approved_draft
          - style_guide
        user_prompt: |
          是否进行风格润色？
          
          风格润色会：
          - 检查并移除 AI 痕迹
          - 调整叙述节奏
          - 统一角色声音
        questions:
          - "是否启用文风处理？"
        auto_advance: false
        next_phase: complete
        options:
          - id: polish
            label: 启用润色
            description: 进行风格润色
          - id: skip
            label: 跳过润色
            description: 直接保存草稿
        
      - phase_id: complete
        name: 完成保存
        description: 保存最终草稿
        available_tools: []
        required_tools: []
        context_keys:
          - final_draft
        user_prompt: |
          章节写作完成！
          
          草稿已保存到：{draft_path}
        auto_advance: true
        next_phase: null
