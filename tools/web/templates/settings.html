{% extends "base.html" %}
{% set active = "settings" %}
{% block title %}设置 — OpenWrite{% endblock %}
{% block content %}
<div class="page-container">
  <div class="page-header">
    <h2>LLM 模型配置</h2>
    <p class="text-dim">管理 AI 模型池、任务类型路由和 API 密钥环境变量</p>
  </div>

  <div class="settings-grid">
    <!-- 全局开关 -->
    <div class="card">
      <div class="card-header">
        <span>全局设置</span>
        <label class="toggle-switch">
          <input type="checkbox" id="llm-enabled">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="card-body">
        <div class="form-row">
          <div class="form-group">
            <label>重试次数</label>
            <input class="form-input" type="number" id="retry-count" value="2" min="0" max="10">
          </div>
          <div class="form-group">
            <label>重试间隔 (秒)</label>
            <input class="form-input" type="number" id="retry-delay" value="1.0" min="0" max="30" step="0.5">
          </div>
        </div>
      </div>
    </div>

    <!-- 模型池 -->
    <div class="card">
      <div class="card-header">
        <span>模型池</span>
        <button class="btn btn-sm" onclick="addModel()">+ 添加模型</button>
      </div>
      <div class="card-body">
        <div id="models-container">
          <!-- 动态生成模型表格 -->
        </div>
      </div>
    </div>

    <!-- 任务路由 -->
    <div class="card">
      <div class="card-header">
        <span>任务路由</span>
      </div>
      <div class="card-body" id="routes-container">
        <!-- 动态生成任务路由配置 -->
      </div>
    </div>
  </div>

  <div class="settings-actions">
    <button class="btn btn-secondary" onclick="loadConfig()">重新加载</button>
    <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  var TASK_TYPES = [
    { key: 'reasoning', label: '调度决策 (Director)', desc: '推理强模型，推荐 Claude/ChatGPT' },
    { key: 'generation', label: '文本生成 (Writer)', desc: '长文本模型，推荐 Kimi/MiniMax' },
    { key: 'review', label: '逻辑审查 (Reviewer)', desc: '推理准确模型，推荐 Claude/ChatGPT' },
    { key: 'style', label: '风格润色 (Stylist)', desc: '中文理解好的模型，推荐 Kimi/GLM' }
  ];

  var currentModels = {}; // name -> ModelConfig

  function renderModelsTable() {
    var container = document.getElementById('models-container');
    if (Object.keys(currentModels).length === 0) {
      container.innerHTML = '<p class="text-dim">暂无模型，点击"添加模型"开始配置</p>';
      return;
    }

    var html = '<table class="models-table"><thead><tr>';
    html += '<th>名称</th><th>模型标识符</th><th>API Base</th><th>Key Env</th>';
    html += '<th>Max Tokens</th><th>Temperature</th><th>Timeout</th><th>操作</th>';
    html += '</tr></thead><tbody>';

    Object.keys(currentModels).forEach(function(name) {
      var m = currentModels[name];
      html += '<tr data-model-name="' + name + '">';
      html += '<td><input class="form-input" data-field="name" value="' + name + '"></td>';
      html += '<td><input class="form-input" data-field="model" value="' + (m.model || '') + '"></td>';
      html += '<td><input class="form-input" data-field="api_base" value="' + (m.api_base || '') + '"></td>';
      html += '<td><input class="form-input" data-field="api_key_env" value="' + (m.api_key_env || '') + '"></td>';
      html += '<td><input class="form-input" type="number" data-field="max_tokens" value="' + (m.max_tokens || 4096) + '" style="width:80px"></td>';
      html += '<td><input class="form-input" type="number" data-field="temperature" value="' + (m.temperature || 0.7) + '" step="0.1" style="width:60px"></td>';
      html += '<td><input class="form-input" type="number" data-field="timeout" value="' + (m.timeout || 120) + '" style="width:60px"></td>';
      html += '<td><button class="btn btn-sm btn-danger" onclick="deleteModel(\'' + name + '\')">删除</button></td>';
      html += '</tr>';
    });

    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function renderRoutesConfig() {
    var container = document.getElementById('routes-container');
    var html = '';

    TASK_TYPES.forEach(function(t) {
      html += '<div class="route-section" data-task-type="' + t.key + '">';
      html += '<div class="route-title">' + t.label + ' <span class="text-dim" style="font-size:12px">' + t.desc + '</span></div>';
      html += '<div class="form-row">';
      html += '<div class="form-group" style="flex:2"><label>可用模型（按优先级排序）</label>';
      html += '<select class="form-input" data-field="models" multiple size="4"></select></div>';
      html += '<div class="form-group" style="flex:1"><label>首选模型索引</label>';
      html += '<input class="form-input" type="number" data-field="primary_index" value="0" min="0"></div>';
      html += '</div></div>';
    });

    container.innerHTML = html;

    // 填充模型选项
    var modelNames = Object.keys(currentModels);
    document.querySelectorAll('.route-section select[data-field="models"]').forEach(function(sel) {
      modelNames.forEach(function(name) {
        var opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        sel.appendChild(opt);
      });
    });
  }

  function collectModels() {
    var models = {};
    document.querySelectorAll('.models-table tbody tr').forEach(function(row) {
      var name = row.querySelector('[data-field="name"]').value.trim();
      if (!name) return;
      var m = {};
      row.querySelectorAll('[data-field]').forEach(function(inp) {
        var field = inp.dataset.field;
        if (field === 'name') return;
        var val = inp.value.trim();
        if (inp.type === 'number') val = parseFloat(val) || (field === 'max_tokens' ? 4096 : field === 'temperature' ? 0.7 : 120);
        if (val !== '') m[field] = val;
      });
      m.name = name;
      models[name] = m;
    });
    return models;
  }

  function collectRoutes() {
    var routes = {};
    document.querySelectorAll('.route-section').forEach(function(sec) {
      var taskType = sec.dataset.taskType;
      var modelsSelect = sec.querySelector('[data-field="models"]');
      var primaryIndexInput = sec.querySelector('[data-field="primary_index"]');
      
      var selectedModels = Array.from(modelsSelect.selectedOptions).map(function(opt) { return opt.value; });
      var primaryIndex = parseInt(primaryIndexInput.value) || 0;

      if (selectedModels.length > 0) {
        routes[taskType] = {
          models: selectedModels,
          primary_index: Math.min(primaryIndex, selectedModels.length - 1)
        };
      }
    });
    return routes;
  }

  window.addModel = function() {
    var name = prompt('输入模型名称（如 "Claude Opus 4.6"）：');
    if (!name || !name.trim()) return;
    name = name.trim();
    if (currentModels[name]) {
      alert('模型名称已存在');
      return;
    }
    currentModels[name] = {
      name: name,
      model: '',
      api_base: '',
      api_key_env: '',
      max_tokens: 4096,
      temperature: 0.7,
      timeout: 120
    };
    renderModelsTable();
    renderRoutesConfig();
  };

  window.deleteModel = function(name) {
    if (!confirm('确定删除模型 "' + name + '"？')) return;
    delete currentModels[name];
    renderModelsTable();
    renderRoutesConfig();
  };

  window.loadConfig = function() {
    api.get('/api/settings/llm').then(function(data) {
      document.getElementById('llm-enabled').checked = !!data.enabled;
      document.getElementById('retry-count').value = data.retry_count || 2;
      document.getElementById('retry-delay').value = data.retry_delay || 1.0;

      currentModels = data.models || {};
      renderModelsTable();
      renderRoutesConfig();

      // 填充路由配置
      if (data.routes) {
        Object.keys(data.routes).forEach(function(taskType) {
          var route = data.routes[taskType];
          var sec = document.querySelector('.route-section[data-task-type="' + taskType + '"]');
          if (!sec) return;

          var modelsSelect = sec.querySelector('[data-field="models"]');
          var primaryIndexInput = sec.querySelector('[data-field="primary_index"]');

          // 选中模型
          Array.from(modelsSelect.options).forEach(function(opt) {
            opt.selected = route.models && route.models.indexOf(opt.value) !== -1;
          });

          primaryIndexInput.value = route.primary_index || 0;
        });
      }

      toast('配置已加载');
    });
  };

  window.saveConfig = function() {
    var models = collectModels();
    var routes = collectRoutes();

    var payload = {
      enabled: document.getElementById('llm-enabled').checked,
      retry_count: parseInt(document.getElementById('retry-count').value) || 2,
      retry_delay: parseFloat(document.getElementById('retry-delay').value) || 1.0,
      models: models,
      routes: routes
    };

    api.put('/api/settings/llm', payload).then(function() {
      currentModels = models;
      toast('配置已保存');
    });
  };

  // 初始加载（等待 app.js 加载完成）
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof api !== 'undefined') {
      loadConfig();
    } else {
      // 如果 api 还未定义，稍后重试
      setTimeout(function() {
        if (typeof api !== 'undefined') loadConfig();
      }, 100);
    }
  });
})();
</script>

<style>
.models-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
}
.models-table th,
.models-table td {
  padding: 8px;
  text-align: left;
  border-bottom: 1px solid var(--border-color);
}
.models-table th {
  background: var(--bg-secondary);
  font-weight: 600;
  font-size: 13px;
}
.models-table input {
  width: 100%;
  min-width: 80px;
}
.route-section {
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border-color);
}
.route-section:last-child {
  border-bottom: none;
}
.route-title {
  font-weight: 600;
  margin-bottom: 12px;
  font-size: 14px;
}
.btn-danger {
  background: #dc3545;
  color: white;
}
.btn-danger:hover {
  background: #c82333;
}
</style>
{% endblock %}
