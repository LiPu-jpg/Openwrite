enabled: true
retry_count: 2
retry_delay: 1.0
models:
  Kimi-K2.5:
    model: openai/kimi-k2.5
    api_base: https://api.moonshot.cn/v1
    api_key_env: KIMI_API_KEY
    max_tokens: 16000
    temperature: 1
    timeout: 120
    name: Kimi-K2.5
  DeepSeek:
    model: deepseek/deepseek-chat
    api_base: https://api.deepseek.com/v1/chat/completions
    api_key_env: DEEPSEEK_API_KEY
    max_tokens: 8192
    temperature: 0.7
    timeout: 120
    name: DeepSeek
  GLM-4-Plus:
    model: glm-4.7
    api_base: https://open.bigmodel.cn/api/paas/v4
    api_key_env: GLM_API_KEY
    max_tokens: 8192
    temperature: 0.7
    timeout: 120
    name: GLM-4-Plus
routes:
  reasoning:
    models:
    - Kimi-K2.5
    - DeepSeek
    - GLM-4-Plus
    primary_index: 1
  generation:
    models:
    - Kimi-K2.5
    - DeepSeek
    - GLM-4-Plus
    primary_index: 0
  review:
    models:
    - Kimi-K2.5
    - DeepSeek
    - GLM-4-Plus
    primary_index: 1
  style:
    models:
    - Kimi-K2.5
    - DeepSeek
    - GLM-4-Plus
    primary_index: 1
